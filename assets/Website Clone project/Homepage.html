<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My first html5 page</title>
    <link rel="icon" type="image/icon" href="./images/Favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <img src="./images/weblogo.png" alt="website logo" />

        <div class="nav-links">
          <ul>
            <li>
              <a href="#">Products</a>
              <div class="nav-dropdown">
                <div class="dropdown-panel">
                  <div class="panel-item-one"></div>
                </div>
              </div>
            </li>
            <li><a href="#">Industries</a></li>
            <li><a href="#">Resources</a></li>
            <li><a href="#">Customer Stories</a></li>
            <li><a href="#">Pricing</a></li>
          </ul>
        </div>

        <div class="nav-action">
          <button class="hidden">Login</button>
          <button class="dark">Try Bonsai for free</button>
          <button class="light">Contact sales</button>
        </div>
      </nav>
    </header>

    <main>
      <div class="hero-section">
        <div class="grid-item-one">
          <div class="hero-part-one">
            <p>In partnership With</p>
            <img src="./images/Dribble.png" alt="Dribble company logo" />
          </div>

          <div class="hero-part-two">
            <h1>
              The business software for <br />
              design agencies
            </h1>
            <p>
              Designed to simplify project management, delight clients, and
              increase profitability. <br />
              Book your free demo or sign up today and get 30% off.
            </p>

            <div class="hero-button">
              <button class="dark">Get started</button>
              <button class="dark">Book a demo</button>
            </div>

            <div class="review">
              <img
                src="./images/star review.png"
                alt="5 star review of the business"
              />
              <p>1020+ Reviews</p>
            </div>
          </div>
        </div>

        <div class="grid-item-two">
          <div class="hero-image">
            <img
              src="./images/Side-image.png"
              alt="picture of laptop on a table"
            />
          </div>
        </div>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
